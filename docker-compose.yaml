services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: jim628
      MYSQL_DATABASE: JimCafeDB
      MYSQL_USER: dguzman
      MYSQL_PASSWORD: 1234
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - jimzcafe_default

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_USER: dguzman
      PMA_PASSWORD: 1234
    ports:
      - "${PHPMYADMIN_HOST_PORT:-8082}:80"
    depends_on:
      - mysql
    networks:
      - jimzcafe_default

  ###> websocket ###
  websocket:
    build: ./websocket
    restart: unless-stopped
    environment:
      WEBSOCKET_PORT: 8081
      WEBSOCKET_SECRET: 'dev-websocket-secret'
    ports:
      - "${WEBSOCKET_HOST_PORT:-8081}:8081"
    networks:
      - jimzcafe_default
  ###< websocket ###

volumes:
  mysql_data:

networks:
  jimzcafe_default:
    driver: bridge
