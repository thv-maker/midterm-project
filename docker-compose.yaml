services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: jim628
      MYSQL_DATABASE: JimCafeDB
      MYSQL_USER: dguzman
      MYSQL_PASSWORD: 1234
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - jimzcafe_default

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_USER: dguzman
      PMA_PASSWORD: 1234
    ports:
      - "${PHPMYADMIN_HOST_PORT:-8081}:80"
    depends_on:
      - mysql
    networks:
      - jimzcafe_default

  mercure:
    image: dunglas/mercure
    restart: unless-stopped
    environment:
      # Allow demo mode for local development
      ALLOW_ANONYMOUS: "1"
      CORS_ALLOWED_ORIGINS: "*"
      JWT_KEY: "!ChangeMe!"
      PUBLISHER_JWT_KEY: "!ChangeMe!"
      SUBSCRIBER_JWT_KEY: "!ChangeMe!"
      MERCURE_PUBLISHER_JWT_KEY: "!ChangeMe!"
      MERCURE_SUBSCRIBER_JWT_KEY: "!ChangeMe!"
    ports:
      - "3000:80"
    networks:
      - jimzcafe_default

volumes:
  mysql_data:

networks:
  jimzcafe_default:
    driver: bridge
