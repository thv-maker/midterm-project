[variables]
APP_ENV = "prod"
COMPOSER_ALLOW_SUPERUSER = "1"

[phases.setup]
nixPkgs = ["php84", "php84Packages.composer", "nodejs_20"]

[phases.install]
cmds = [
  "composer install --no-dev --optimize-autoloader --no-interaction --no-scripts",
  "npm ci"
]

[phases.build]
cmds = [
  "npm run build"
]

[start]
cmd = "php -S 0.0.0.0:${PORT:-8080} -t public"
