parameters:
    cors_allow_origin_default: '^https?://(localhost|127\\.0\\.0\\.1)(:[0-9]+)?$'

nelmio_cors:
    defaults:
        origin_regex: true
        allow_origin: ['%env(default:cors_allow_origin_default:CORS_ALLOW_ORIGIN)%']
        allow_methods: ['GET', 'OPTIONS', 'POST', 'PUT', 'PATCH', 'DELETE']
        allow_headers: ['Content-Type', 'Authorization']
        expose_headers: ['Link']
        max_age: 3600
    paths:
        '^/': null
