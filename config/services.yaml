# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    firebase.project_id_default: ''
    firebase.service_account_default: ''
    websocket_default_broadcast_url: 'http://127.0.0.1:8081/broadcast'
    websocket_default_public_url: 'ws://127.0.0.1:8081/ws'
    websocket_default_secret: 'dev-websocket-secret'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

    App\Service\FcmNotificationService:
        arguments:
            $firebaseProjectId: '%env(default:firebase.project_id_default:FIREBASE_PROJECT_ID)%'
            $firebaseServiceAccount: '%env(default:firebase.service_account_default:FIREBASE_SERVICE_ACCOUNT_B64)%'

    App\Service\WebSocketPublisher:
        arguments:
            $broadcastUrl: '%env(default:websocket_default_broadcast_url:WEBSOCKET_BROADCAST_URL)%'
            $broadcastSecret: '%env(default:websocket_default_secret:WEBSOCKET_SECRET)%'

    App\ApiResource\CustomerApiController:
        arguments:
            $websocketPublicUrl: '%env(default:websocket_default_public_url:WEBSOCKET_PUBLIC_URL)%'
